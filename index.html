<!DOCTYPE html>
<!--
  index.html — Estructura HTML del organigrama

  Este archivo define el esqueleto semántico de la página.
  No contiene lógica ni estilos inline; toda la presentación y comportamiento
  viven en css/styles.css y en los módulos ES de js/.

  Para modificar los datos del gráfico (personas y subproyectos) editá js/data.js.
  Para modificar textos del encabezado (fecha, título) editá este archivo directamente.
-->
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organigrama · Subproyectos</title>

  <!-- Tipografías: Fraunces (serif itálica) + Bricolage Grotesque (sans) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400;1,9..144,500&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="app">

  <!-- ── Encabezado ─────────────────────────────────────────────────────── -->
  <header>
    <div>
      <!-- Modificá esta línea para cambiar la fecha o subtítulo -->
      <div class="eyebrow">Grupo de Inteligencia Artificial y Robótica · Equipo</div>
      <h1>Constelación <em>de proyectos</em></h1>
    </div>
  </header>

  <!-- ── Área del gráfico ───────────────────────────────────────────────── -->
  <main>

    <!-- El SVG es poblado dinámicamente por graph.js -->
    <svg id="graph" aria-label="Gráfico de red de integrantes y subproyectos"></svg>

    <!-- Leyenda de subproyectos (poblada por legend.js) -->
    <div class="legend" role="complementary" aria-label="Leyenda de subproyectos">
      <div class="legend-title">Estructura</div>
      <div id="legend-items"></div>
    </div>

    <!-- Panel de detalle (mostrado al clickear un nodo, gestionado por panel.js) -->
    <div class="panel" id="panel" role="region" aria-label="Detalle del nodo seleccionado">
      <div id="panel-content"></div>
    </div>

    <button class="layout-btn" id="btn-tree" aria-label="Alternar vista de árbol">
      <span class="layout-btn-icon">⊹</span>
      <span id="btn-tree-label">Vista árbol</span>
    </button>

    <footer>arrastra los nodos <span>·</span> click para detalles <span>·</span> rueda para zoom</footer>
  </main>

</div>

<!-- Punto de entrada ES module. D3 se importa desde CDN dentro de graph.js. -->
<script type="module" src="js/main.js"></script>

</body>
</html>
