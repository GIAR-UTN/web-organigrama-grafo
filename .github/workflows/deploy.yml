# deploy.yml — GitHub Actions: publica el sitio en GitHub Pages
#
# Se activa en cada push a la rama `main`.
# Sube el contenido de la raíz del repositorio como artefacto de Pages
# y lo despliega usando el entorno oficial `github-pages`.
#
# Para habilitarlo en tu repositorio:
#   1. Ve a Settings → Pages
#   2. En "Source" seleccioná "GitHub Actions"
#   3. El próximo push a main disparará este workflow

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Permite disparar el deploy manualmente desde la pestaña Actions
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploys concurrentes; si hay uno en curso no lo cancela
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Sube todo el repositorio; ajustá `path` si el sitio está en un subdirectorio
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
